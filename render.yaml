services:
  - type: web
    name: styleos-backend
    runtime: node
    rootDir: StyleOS-backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: MOCK_LLM
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE
        sync: false
