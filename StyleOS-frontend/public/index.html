<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="This is the clone of myntra website with product limitation to T-Shirts"
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Font Awesome's JS build is deliberately NOT loaded. It rewrites every
         <i class="fa-..."> element into an <svg> in the DOM, behind React's
         back. React keeps a reference to the original <i>, so the next time it
         removes that node it throws "NotFoundError: Failed to execute
         'removeChild' on 'Node'" and the ErrorBoundary blanks the whole app.
         The CSS build above renders identical icons via ::before pseudo-
         elements and never touches the DOM tree, so it is React-safe. -->
    <!-- Chrome's auto-translate is the other DOM-rewriter that breaks React
         the same way: it re-wraps text nodes in <font> tags, which makes
         React's removeChild of those text nodes fail. -->
    <meta name="google" content="notranslate" />
    <title>Myntra</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      console.log = function() {}
    </script>
  </body>
</html>
